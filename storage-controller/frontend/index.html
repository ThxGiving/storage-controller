<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refrigeration Logbook</title>
    <!-- Follow Home Assistant / OS light-dark unless the user picked one. Runs
         before paint to avoid a theme flash. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("sc-theme");
          var dark = pref
            ? pref === "dark"
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", !!dark);
        } catch (e) {
          /* default to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
