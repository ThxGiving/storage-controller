substitutions:
  name: dixell-gateway
  friendly_name: "Dixell Waveshare"

  # Poll intervals — all multiples of update_interval (15 s)
  # Change here to reschedule entire groups without touching individual entities.
  su_temp:        "1"   #  1 × 15 s =  30 s  — Raum-/Verdampfertemperatur
  su_setpt_bounds: "8"  #  8 × 15 s =   2 min — LS / US / HY
  su_alarm_cfg:   "12"  # 12 × 15 s =   3 min — ALC / ALP / ALU / ALL
  su_alarm_time:  "16"  # 16 × 15 s =   4 min — AFH / ALd / dAo
  su_defrost:     "20"  # 20 × 15 s =   5 min — dtE / idF / MdF
  su_mechanical:  "24"  # 24 × 15 s =   6 min — Ac / FSt

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  
  devices:
  - id: storage1
    name: "Kühlhaus 1"
  - id: storage2
    name: "Kühlhaus 2"
  - id: storage3
    name: "Kühlhaus 3"
  
  on_boot:
    then:
      # read the RTC time once when the system boots
      - pcf85063.read_time:
      # Seed the connectivity sensors so HA shows a defined state immediately.
      # on_online only fires on a LATER offline->online transition, so without a
      # seed the template binary_sensors read "unknown" when a slave is online
      # from boot. We seed ON (optimistic); on_offline flips any slave that is
      # actually down to OFF within the first poll cycles.
      - binary_sensor.template.publish:
          id: storage1_online
          state: ON
      - binary_sensor.template.publish:
          id: storage2_online
          state: ON
      - binary_sensor.template.publish:
          id: storage3_online
          state: ON


esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 80MHz
  framework:
    type: esp-idf

# Enable logging
logger:
  baud_rate: 0 # frees the 3rd UART and avoids some bugs like "WK2168 with canbus" or "BLE client with RS485 modbus"
  # Uncomment the next two lines temporarily to diagnose Modbus communication gaps:
  # level: DEBUG
  # logs:
  #   modbus_controller: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key
  # Re-publish the connectivity states whenever HA (re)connects, so they are not
  # shown as "unknown" after a Home Assistant restart (the ESP keeps running and
  # would otherwise not emit a fresh state until the next online/offline change).
  on_client_connected:
    then:
      - binary_sensor.template.publish:
          id: storage1_online
          state: !lambda 'return id(storage1_online).state;'
      - binary_sensor.template.publish:
          id: storage2_online
          state: !lambda 'return id(storage2_online).state;'
      - binary_sensor.template.publish:
          id: storage3_online
          state: !lambda 'return id(storage3_online).state;'

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none  # ESP32 WiFi modem sleep causes sporadic disconnects

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Coldstorage Fallback Hotspot"
    password: "replace_with_your_own_fallback_password"

captive_portal:

# ------------------------------------------------------------
# Interfaces GPIOs (Waveshare ESP32-S3-RS485-CAN)
#
# uart_esp_1               RS485 port (RS485_EN = GPIO 21)
#   tx_pin_1: GPIO17
#   rx_pin_1: GPIO18
#
# uart_esp_2               SH1.0 connector
#   tx_pin_2: GPIO1
#   rx_pin_2: GPIO2
#
# uart_esp_3               Pin header
#   tx_pin_3: GPIO3
#   rx_pin_3: GPIO4
#
# canbus_esp32_can         CAN port
#   tx_pin_4: GPIO15
#   rx_pin_4: GPIO16
#
# canbus_mcp2515 (optional)
#   spi_mosi_pin: GPIO11
#   spi_miso_pin: GPIO13
#   spi_clk_pin : GPIO12
#   mcp2515_cs  : GPIO10
# ------------------------------------------------------------

# -------------------------
# RS485 / Modbus RTU
# -------------------------

i2c:
  scl: GPIO38
  sda: GPIO39

time:
  - platform: pcf85063
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
  - platform: homeassistant
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        pcf85063.write_time:

uart:
  id: uart_rs485
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  tx_pin: GPIO17
  rx_pin: GPIO18
  flow_control_pin: GPIO21

modbus:
  id: modbus1
  uart_id: uart_rs485

# Each Dixell controller is a Modbus slave on the SHARED RS485 bus. A single
# flaky slave (e.g. wiring/termination at the far end, or that controller itself)
# silently turns ITS entities "unavailable" in HA while the others keep working
# — which looks like "Kühlhaus X gets no live data for minutes". The on_online/
# on_offline triggers below publish an explicit per-controller connectivity signal
# so the dropout is visible and alarmable instead of silent. max_cmd_retries +
# offline_skip_updates make a dead slave fail fast and stop hogging the bus with
# retry traffic while it is down (so the healthy controllers aren't starved).
modbus_controller:
  - id: storage1ctlr
    address: 1
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 15s
    max_cmd_retries: 2
    offline_skip_updates: 3
    on_online:
      then:
        - binary_sensor.template.publish:
            id: storage1_online
            state: ON
    on_offline:
      then:
        - binary_sensor.template.publish:
            id: storage1_online
            state: OFF
  - id: storage2ctlr
    address: 2
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 15s
    max_cmd_retries: 2
    offline_skip_updates: 3
    on_online:
      then:
        - binary_sensor.template.publish:
            id: storage2_online
            state: ON
    on_offline:
      then:
        - binary_sensor.template.publish:
            id: storage2_online
            state: OFF
  - id: storage3ctlr
    address: 3
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 15s
    max_cmd_retries: 2
    offline_skip_updates: 3
    on_online:
      then:
        - binary_sensor.template.publish:
            id: storage3_online
            state: ON
    on_offline:
      then:
        - binary_sensor.template.publish:
            id: storage3_online
            state: OFF

binary_sensor:
    # Per-controller Modbus connectivity. Published by the modbus_controller
    # on_online/on_offline triggers above. device_class: connectivity surfaces a
    # clear "verbunden/getrennt" state in HA you can alarm on — so a slave that
    # stops answering on the shared RS485 bus is noticed immediately instead of
    # only showing up as a silent temperature gap.
  - platform: template
    name: "Modbus verbunden"
    id: storage1_online
    device_id: storage1
    device_class: connectivity
    entity_category: diagnostic
  - platform: template
    name: "Modbus verbunden"
    id: storage2_online
    device_id: storage2
    device_class: connectivity
    entity_category: diagnostic
  - platform: template
    name: "Modbus verbunden"
    id: storage3_online
    device_id: storage3
    device_class: connectivity
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Ventilator"
    icon: "mdi:fan"
    register_type: coil
    address: 539
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Kompressor"
    icon: "mdi:engine"
    register_type: coil
    address: 542
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Ventilator"
    icon: "mdi:fan"
    register_type: coil
    address: 539
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Kompressor"
    icon: "mdi:engine"
    register_type: coil
    address: 542
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Ventilator"
    icon: "mdi:fan"
    register_type: coil
    address: 539
    device_id: storage3

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Kompressor"
    icon: "mdi:engine"
    register_type: coil
    address: 542
    device_id: storage3

