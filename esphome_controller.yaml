sensor:
  - platform: internal_temperature
    name: "Interne Temperatur"
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Raumtemperatur (PR)"
    id: kh1_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    skip_updates: ${su_temp}
    filters:
      - multiply: 0.1
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Verdampfertemperatur (P2)"
