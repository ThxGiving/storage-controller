sensor:
  - platform: internal_temperature
    name: "Interne Temperatur"

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Temperatur"
    id: kh1_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Verdampfertemperatur"
    id: kh1_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 264
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Temperatur"
    id: kh2_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Verdampfertemperatur"
    id: kh2_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 264
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Temperatur"
    id: kh3_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage3

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Verdampfertemperatur"
    id: kh3_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 264
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage3

  # ── Parameter-Sensoren (P[N] → 0x0300 + N-1, P000/SEt → 0x035E) ────────────
  # ALU/ALL = Alarm-Offsets relativ zu SEt (ALC=0): ALU=+8°C über, ALL=5°C unter Sollwert
  # Kühlhaus 1
  - { platform: modbus_controller, modbus_controller_id: storage1ctlr, name: "Abtau-Endtemp",      icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 797, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage1, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage1ctlr, name: "Abtau-Intervall",    icon: "mdi:timer-refresh-outline",    register_type: holding, address: 799, value_type: U_WORD, unit_of_measurement: "h",  accuracy_decimals: 0, device_id: storage1, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage1ctlr, name: "Abtau-Maxzeit",      icon: "mdi:timer-stop-outline",       register_type: holding, address: 800, value_type: U_WORD, unit_of_measurement: "min", accuracy_decimals: 0, device_id: storage1, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage1ctlr, name: "Setpoint-Min",       icon: "mdi:thermometer-chevron-down", register_type: holding, address: 769, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage1, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage1ctlr, name: "Setpoint-Max",       icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 770, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage1, skip_updates: 40 }
  # Kühlhaus 2
  - { platform: modbus_controller, modbus_controller_id: storage2ctlr, name: "Abtau-Endtemp",      icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 797, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage2, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage2ctlr, name: "Abtau-Intervall",    icon: "mdi:timer-refresh-outline",    register_type: holding, address: 799, value_type: U_WORD, unit_of_measurement: "h",  accuracy_decimals: 0, device_id: storage2, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage2ctlr, name: "Abtau-Maxzeit",      icon: "mdi:timer-stop-outline",       register_type: holding, address: 800, value_type: U_WORD, unit_of_measurement: "min", accuracy_decimals: 0, device_id: storage2, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage2ctlr, name: "Setpoint-Min",       icon: "mdi:thermometer-chevron-down", register_type: holding, address: 769, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage2, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage2ctlr, name: "Setpoint-Max",       icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 770, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage2, skip_updates: 40 }
  # Kühlhaus 3
  - { platform: modbus_controller, modbus_controller_id: storage3ctlr, name: "Abtau-Endtemp",      icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 797, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage3, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage3ctlr, name: "Abtau-Intervall",    icon: "mdi:timer-refresh-outline",    register_type: holding, address: 799, value_type: U_WORD, unit_of_measurement: "h",  accuracy_decimals: 0, device_id: storage3, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage3ctlr, name: "Abtau-Maxzeit",      icon: "mdi:timer-stop-outline",       register_type: holding, address: 800, value_type: U_WORD, unit_of_measurement: "min", accuracy_decimals: 0, device_id: storage3, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage3ctlr, name: "Setpoint-Min",       icon: "mdi:thermometer-chevron-down", register_type: holding, address: 769, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage3, skip_updates: 40 }
  - { platform: modbus_controller, modbus_controller_id: storage3ctlr, name: "Setpoint-Max",       icon: "mdi:thermometer-chevron-up",   register_type: holding, address: 770, value_type: S_WORD, unit_of_measurement: "°C", accuracy_decimals: 1, filters: [{multiply: 0.1}], device_id: storage3, skip_updates: 40 }



