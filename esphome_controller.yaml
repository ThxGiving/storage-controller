select:
  # ── ALP: Fühlerauswahl Temperaturalarm (P054, Adresse 821) ──────────────────
  # Welcher Fühler löst den Temperaturalarm (ALU/ALL) aus.
  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Fühlerauswahl Temperaturalarm (ALP)"
    icon: "mdi:thermometer-probe"
    address: 821
    value_type: U_WORD
    skip_updates: ${su_alarm_cfg}
    entity_category: config
    device_id: storage1
    optionsmap:
      "P1 — Raumfühler": 1
      "P2 — Verdampferfühler": 2
      "P3": 3
      "P4": 4
  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
