sensor:
  - platform: internal_temperature
    name: "Interne Temperatur"

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Temperatur"
    id: kh1_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Verdampfertemperatur"
    id: kh1_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 257
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Temperatur"
    id: kh2_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Verdampfertemperatur"
    id: kh2_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 257
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Temperatur"
    id: kh3_temp
    icon: "mdi:thermometer"
    register_type: holding
    address: 256
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage3

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Verdampfertemperatur"
    id: kh3_evap
    icon: "mdi:coolant-temperature"
    register_type: holding
    address: 257
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    device_id: storage3

  # (Holding-register scan removed: the XW60K rejected 0x500/0x800 with Modbus
  #  exceptions 3/2 — those addresses don't exist on this model. Digital state
  #  lives in the COIL space instead; see the read-only coil scan in
  #  binary_sensor: below.)

number:
  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Setpoint"
    icon: "mdi:target"
    mode: BOX
    register_type: holding
    address: 862
    value_type: S_WORD
    unit_of_measurement: "°C"
    min_value: -40
    max_value: 40
    step: 0.1
    multiply: 10
    device_id: storage1

  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Hysterese"
    icon: "mdi:delta"
    mode: BOX
    register_type: holding
    address: 768
    value_type: S_WORD
    unit_of_measurement: "°C"
    min_value: 0.1
    max_value: 10
    step: 0.1
    multiply: 10
    device_id: storage1
  
  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Setpoint"
    icon: "mdi:target"
    mode: BOX
    register_type: holding
    address: 862
    value_type: S_WORD
    unit_of_measurement: "°C"
    min_value: -40
    max_value: 40
    step: 0.1
    multiply: 10
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage2ctlr
    name: "Hysterese"
    icon: "mdi:delta"
    mode: BOX
    register_type: holding
    address: 768
    value_type: S_WORD
    unit_of_measurement: "°C"
    min_value: 0.1
    max_value: 10
    step: 0.1
    multiply: 10
    device_id: storage2

  - platform: modbus_controller
    modbus_controller_id: storage3ctlr
    name: "Setpoint"
    icon: "mdi:target"
    mode: BOX
    register_type: holding
    address: 862
