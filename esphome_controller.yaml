# ============================================================
# TEMPORARY: one consolidated, unit-labelled temperature line in the log.
# Uses INTERNAL ids only — it does NOT rename the sensors, so HA entity_ids
# and the Storage-Controller app's entity assignments stay unchanged.
# Remove this block once you no longer need it for debugging.
# ------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - logger.log:
          level: INFO
          format: "Temp °C — KH1 %.1f/%.1f  KH2 %.1f/%.1f  KH3 %.1f/%.1f  (Raum/Verdampfer)"
          args:
            - 'id(kh1_temp).state'
            - 'id(kh1_evap).state'
            - 'id(kh2_temp).state'
            - 'id(kh2_evap).state'
            - 'id(kh3_temp).state'
            - 'id(kh3_evap).state'
# ============================================================
