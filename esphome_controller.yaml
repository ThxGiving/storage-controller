substitutions:
  board_chip: "ESP32-S3"
  board_name: "WS RS485-CAN"
  name: dixell-gateway
  friendly_name: "Dixell Waveshare"
  temp_scale: "0.1"        # meist 0.1°C; ggf. auf 1 ändern

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  
  devices:
  - id: storage1
    name: "Kühlhaus 1"
  - id: storage2
    name: "Kühlhaus 2"
  - id: storage3
    name: "Kühlhaus 3"
  
  on_boot:
    then:
      # read the RTC time once when the system boots
      pcf85063.read_time:


esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

# Enable logging
logger:
  baud_rate: 0 # frees the 3rd UART and avoids some bugs like "WK2168 with canbus" or "BLE client with RS485 modbus"

# Enable Home Assistant API
api:
  encryption:
    key: "replace_with_your_own_encryption_key"

ota:
  - platform: esphome
    password: "replace_with_your_own_ota_password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Coldstorage Fallback Hotspot"
    password: "replace_with_your_own_fallback_password"

captive_portal:

# ------------------------------------------------------------
# Interfaces GPIOs (Waveshare ESP32-S3-RS485-CAN)
#
# uart_esp_1               RS485 port (RS485_EN = GPIO 21)
#   tx_pin_1: GPIO17
#   rx_pin_1: GPIO18
#
# uart_esp_2               SH1.0 connector
#   tx_pin_2: GPIO1
#   rx_pin_2: GPIO2
#
# uart_esp_3               Pin header
#   tx_pin_3: GPIO3
#   rx_pin_3: GPIO4
#
# canbus_esp32_can         CAN port
#   tx_pin_4: GPIO15
#   rx_pin_4: GPIO16
#
# canbus_mcp2515 (optional)
#   spi_mosi_pin: GPIO11
#   spi_miso_pin: GPIO13
#   spi_clk_pin : GPIO12
#   mcp2515_cs  : GPIO10
# ------------------------------------------------------------

# -------------------------
# RS485 / Modbus RTU
# -------------------------

i2c:
  scl: GPIO38
  sda: GPIO39
  scan: true

time:
  - platform: pcf85063
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
  - platform: homeassistant
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        pcf85063.write_time:

uart:
  id: uart_rs485
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  tx_pin: GPIO17
  rx_pin: GPIO18

modbus:
  id: modbus1
  uart_id: uart_rs485
  flow_control_pin: GPIO21

modbus_controller:
  - id: storage1ctlr
    address: 1
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 10s
  - id: storage2ctlr
    address: 2
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 10s
  - id: storage3ctlr
    address: 3
    modbus_id: modbus1
    setup_priority: -10
    command_throttle: 200ms
    update_interval: 10s

