  # ── Alarm-Timing (AFH / ALd / dAo) ──────────────────────────────────────────
  # AFH (P058): Rücksetzschwelle Temperaturalarm — Alarm erlischt erst wenn Temp um AFH
  #   unter ALU gefallen ist. Bereich: 0.1–25.5 °C. Level Pr2.
  # ALd (P059): Alarm-Verzögerung — Temperatur muss X Minuten überschritten sein bevor Alarm feuert.
  #   Bereich: 0–255 min. Level Pr2.
  # dAo (P060): Alarm-Unterdrückung nach Einschalten — kein Alarm in den ersten X Minuten.
  #   Bereich: 0–1440 min (res. 10 min). Level Pr2.
  - platform: modbus_controller
    modbus_controller_id: storage1ctlr
    name: "Alarm-Rücksetzschwelle (AFH)"
    icon: "mdi:thermometer-alert"
    mode: BOX
    register_type: holding
    address: 825
    force_new_range: true
    value_type: S_WORD
    unit_of_measurement: "°C"
    min_value: 0.1
    max_value: 25.5
    step: 0.1
    multiply: 10
    entity_category: config
    skip_updates: ${su_alarm_time}
    device_id: storage1

